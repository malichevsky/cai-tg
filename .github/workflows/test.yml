name: Test Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install System and Python Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libegl1 libxkbcommon-x11-0 libxcb-cursor0
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Linter (flake8)
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          
          # General code style checks (treating as warnings without failing)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Pytest Test Suite
        env:
          QT_QPA_PLATFORM: offscreen # Required for testing PyQt6 headless
          PYTHONPATH: . # Let pytest find main.py and gui.py at repository root
        run: |
          pytest tests/ -v --asyncio-mode=auto
