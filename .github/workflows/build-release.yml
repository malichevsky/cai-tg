name: Build and Release Executables

on:
  push:
    tags:
      - 'v*' # Triggers on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.3.0)'
        required: true
        default: 'v1.3.0'

permissions:
  contents: write

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          
      - name: Install System and Python Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libegl1 libxkbcommon-x11-0 libxcb-cursor0
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Linter (flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Pytest Test Suite
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONPATH: .
        run: |
          pytest tests/ -v --asyncio-mode=auto

  build:
    name: Build on ${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Inject Release Version
      shell: bash
      env:
        RAW_TAG: ${{ github.event.inputs.version || github.ref_name }}
      run: |
        export CLEAN_TAG=${RAW_TAG#v}
        echo "Injecting version $CLEAN_TAG into gui.py..."
        python -c "import re, os; c = open('gui.py').read(); c = re.sub(r'VERSION = \".*?\"', f'VERSION = \"{os.environ[\"CLEAN_TAG\"]}\"', c); open('gui.py', 'w').write(c)"

    - name: Build with PyInstaller
      run: |
        pyinstaller --name CAI-TG --onefile --windowed gui.py
        
    - name: Prepare Assets (Linux)
      if: runner.os == 'Linux'
      run: |
        mv dist/CAI-TG dist/CAI-TG-Linux

    - name: Upload Linux Artifact
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: cai-tg-linux
        path: dist/CAI-TG-Linux
        retention-days: 1

    - name: Prepare Assets (Windows)
      if: runner.os == 'Windows'
      run: |
        move dist\CAI-TG.exe dist\CAI-TG-Windows.exe

    - name: Upload Windows Artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: cai-tg-windows
        path: dist/CAI-TG-Windows.exe
        retention-days: 1

    - name: Prepare Assets (macOS)
      if: runner.os == 'macOS'
      run: |
        cd dist
        zip -r CAI-TG-macOS.zip CAI-TG.app

    - name: Upload macOS Artifact
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: cai-tg-macos
        path: dist/CAI-TG-macOS.zip
        retention-days: 1

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4
        with:
          path: final_binaries
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R final_binaries/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: final_binaries/*
          generate_release_notes: true
