name: Build and Release Executables

on:
  push:
    tags:
      - 'v*' # Triggers on version tags like v1.0.0
  workflow_dispatch: # Allows manual triggering from Actions tab

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --name CAI-TG --onefile --windowed gui.py
        
    - name: Prepare Assets (Linux)
      if: runner.os == 'Linux'
      run: |
        mv dist/CAI-TG dist/CAI-TG-Linux

    - name: Prepare Assets (Windows)
      if: runner.os == 'Windows'
      run: |
        move dist\CAI-TG.exe dist\CAI-TG-Windows.exe

    - name: Prepare Assets (macOS)
      if: runner.os == 'macOS'
      run: |
        cd dist
        zip -r CAI-TG-macOS.zip CAI-TG.app
        mv CAI-TG CAI-TG-macOS || true

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cai-tg-binaries-${{ matrix.os }}
        path: |
          dist/CAI-TG-Linux
          dist/CAI-TG-Windows.exe
          dist/CAI-TG-macOS.zip
          dist/CAI-TG-macOS
        retention-days: 1 # Pass to release job

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Display structure of downloaded files
        run: ls -R dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cai-tg-binaries-ubuntu-latest/CAI-TG-Linux
            dist/cai-tg-binaries-windows-latest/CAI-TG-Windows.exe
            dist/cai-tg-binaries-macos-latest/CAI-TG-macOS.zip
            dist/cai-tg-binaries-macos-latest/CAI-TG-macOS
          generate_release_notes: true
